name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Download gradle-wrapper.jar (required for ./gradlew)
      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          echo "gradle-wrapper.jar downloaded: $(du -sh gradle/wrapper/gradle-wrapper.jar)"

      # 4. Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # 5. Make gradlew executable
      - name: Make gradlew executable
        run: chmod +x gradlew

      # 6. Build DEBUG APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      # 7. Build RELEASE APK (unsigned)
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      # 8. Sign Release APK (only if secrets are set)
      - name: Sign Release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore
          BUILD_TOOLS="$ANDROID_HOME/build-tools/34.0.0"
          $BUILD_TOOLS/apksigner sign \
            --ks release.keystore \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$STORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out app/build/outputs/apk/release/app-release-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk
          rm -f release.keystore

      # 9. Collect APKs
      - name: Collect APK artifacts
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk artifacts/StrategyBot-debug.apk
          if [ -f app/build/outputs/apk/release/app-release-signed.apk ]; then
            cp app/build/outputs/apk/release/app-release-signed.apk artifacts/StrategyBot-release-signed.apk
          fi
          cp app/build/outputs/apk/release/app-release-unsigned.apk artifacts/StrategyBot-release-unsigned.apk 2>/dev/null || true
          echo "=== APK files ===" && ls -lh artifacts/

      # 10. Upload Debug APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: StrategyBot-Debug-APK
          path: artifacts/StrategyBot-debug.apk
          retention-days: 30

      # 11. Upload Release APK
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: StrategyBot-Release-APK
          path: artifacts/
          retention-days: 30

      # 12. Create GitHub Release (only on version tags like v1.0.0)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Strategy Bot ${{ github.ref_name }}"
          body: |
            ## Strategy Bot ${{ github.ref_name }}
            ### Install
            1. Download `StrategyBot-release-signed.apk` (or debug)
            2. On your phone: Settings → Security → Allow Unknown Sources
            3. Open the APK to install
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
